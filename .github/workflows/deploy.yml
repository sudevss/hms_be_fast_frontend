name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/hmsfrontend
            git pull origin main
            echo "VITE_API_BASE_URL=http://150.241.245.172:8000" > .env
            npm install
            npm run build
            cp -r /home/hmsfrontend/server/client/* /var/www/html/
            cp /home/hmsfrontend/nginx.conf /etc/nginx/sites-available/default
            systemctl restart nginx
